<!-- Supplier Form - Redesigned with same card style -->
<style>
    /* Same design styles as patient and medicine forms - does NOT affect sidebar */
    .supplier-form-container {
        font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }
    
    /* White card/box styling */
    .supplier-card {
        background: #ffffff;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        padding: 1.5rem 2rem 2rem 2rem;
        margin-bottom: 1rem;
        transition: all 0.2s ease;
        border: 1px solid #eef2f6;
        margin-left: auto;
        margin-right: 0;
        width: 100%;
        max-width: 95%;
    }
    
    /* Card header styling */
    .supplier-card-header {
        margin-bottom: 1.75rem;
        padding-bottom: 1rem;
        border-bottom: 2px solid #f0f2f5;
    }
    
    .supplier-card-header h3 {
        font-size: 1.35rem;
        font-weight: 700;
        color: #1a4b6e;
        margin: 0 0 0.25rem 0;
    }
    
    .supplier-card-header p {
        font-size: 0.8rem;
        color: #6c86a3;
        margin: 0;
    }
    
    .supplier-form-container .form-group {
        margin-bottom: 1.25rem;
        position: relative;
    }
    
    .supplier-form-container label {
        font-weight: 600;
        font-size: 0.8rem;
        letter-spacing: 0.3px;
        color: #1a4b6e;
        margin-bottom: 6px;
        display: flex;
        align-items: center;
        gap: 6px;
        text-transform: uppercase;
    }
    
    .supplier-form-container label i {
        color: #2c7da0;
        width: 16px;
        font-size: 0.75rem;
    }
    
    .supplier-form-container .form-control,
    .supplier-form-container input,
    .supplier-form-container textarea {
        width: 100%;
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        transition: all 0.2s ease;
        padding: 0.7rem 1rem;
        font-size: 0.9rem;
        background: #fafbfc;
    }
    
    .supplier-form-container .form-control:focus {
        border-color: #2c7da0;
        background: #ffffff;
        box-shadow: 0 0 0 3px rgba(44,125,160,0.1);
        outline: none;
    }
    
    .supplier-form-container .form-control:hover {
        border-color: #bdd3e8;
        background: #ffffff;
    }
    
    /* Make textareas taller */
    .supplier-form-container textarea.form-control {
        min-height: 80px;
        resize: vertical;
    }
    
    .supplier-form-container .btn-primary-custom {
        background: linear-gradient(135deg, #1f6392 0%, #2c7da0 100%);
        border: none;
        padding: 12px 32px;
        font-weight: 600;
        font-size: 0.9rem;
        border-radius: 40px;
        color: white;
        transition: all 0.2s ease;
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(28,85,120,0.2);
    }
    
    .supplier-form-container .btn-primary-custom:hover {
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(28,85,120,0.3);
        background: linear-gradient(135deg, #155579 0%, #236b8e 100%);
    }
    
    .supplier-form-container .btn-primary-custom:active {
        transform: translateY(0px);
    }
    
    .supplier-form-container code.text-danger {
        font-size: 0.65rem;
        font-weight: 500;
        background: #fff5f5;
        padding: 3px 10px;
        border-radius: 20px;
        margin-top: 5px;
        display: inline-block;
    }
    
    .supplier-form-container #supplier_acknowledgement {
        padding: 10px 15px;
        border-radius: 40px;
        font-weight: 500;
        transition: all 0.2s ease;
    }
    
    .supplier-form-container .required-star:after {
        content: "*";
        color: #dc3545;
        margin-left: 4px;
        font-size: 0.75rem;
    }
    
    .supplier-form-container hr {
        margin: 1.25rem 0;
        border: 0;
        height: 1px;
        background: linear-gradient(90deg, transparent, #e2e8f0, transparent);
    }
    
    /* Button wrapper - CENTERED */
    .button-wrapper {
        display: flex;
        justify-content: center;
        margin-top: 1rem;
        padding-top: 0.5rem;
    }
    
    /* Placeholder styling */
    .supplier-form-container input::placeholder,
    .supplier-form-container textarea::placeholder {
        color: #a0b8cc;
        font-size: 0.85rem;
        font-weight: 400;
    }
    
    /* Remove spinner arrows from number input */
    .supplier-form-container input[type="number"] {
        -moz-appearance: textfield;
    }
    
    .supplier-form-container input[type="number"]::-webkit-inner-spin-button,
    .supplier-form-container input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }
</style>

<div class="supplier-form-container">
    <div class="supplier-card">
        
        <!-- Card header -->
        <div class="supplier-card-header">
            <h3><i class="fas fa-truck" style="margin-right: 10px; color: #2c7da0;"></i> Add New Supplier</h3>
            <p>Please fill all the required fields with supplier information</p>
        </div>
        
        <!-- supplier details content -->
        <!-- supplier name control -->
        <div class="row col col-md-12">
            <div class="col col-md-12 form-group">
                <label for="supplier_name">
                    <i class="fas fa-building"></i> 
                    Supplier Name <span class="required-star"></span>
                </label>
                <input type="text" class="form-control" placeholder="Enter supplier name" id="supplier_name" onkeyup="validateName(this.value, 'name_error');">
                <code class="text-danger small font-weight-bold float-right" id="name_error" style="display: none;"></code>
            </div>
        </div>

        <!-- supplier email control -->
        <div class="row col col-md-12">
            <div class="col col-md-12 form-group">
                <label for="supplier_email">
                    <i class="fas fa-envelope"></i> 
                    Supplier Email
                </label>
                <input type="email" autocomplete="off" class="form-control" placeholder="Enter email address" id="supplier_email" onblur="validateEmail(this.value, 'email_error');">
                <code class="text-danger small font-weight-bold float-right" id="email_error" style="display: none;"></code>
            </div>
        </div>

        <!-- supplier contact number control -->
        <div class="row col col-md-12">
            <div class="col col-md-12 form-group">
                <label for="supplier_contact_number">
                    <i class="fas fa-phone-alt"></i> 
                    Supplier Contact Number <span class="required-star"></span>
                </label>
                <input type="number" class="form-control" placeholder="Enter contact number" id="supplier_contact_number" onblur="validateContactNumber(this.value, 'contact_number_error');">
                <code class="text-danger small font-weight-bold float-right" id="contact_number_error" style="display: none;"></code>
            </div>
        </div>

        <!-- supplier address control -->
        <div class="row col col-md-12">
            <div class="col col-md-12 form-group">
                <label for="supplier_address">
                    <i class="fas fa-map-marker-alt"></i> 
                    Supplier Address <span class="required-star"></span>
                </label>
                <textarea class="form-control" placeholder="Enter complete address (street, city, postal code)" id="supplier_address" rows="3" onblur="validateAddress(this.value, 'address_error');"></textarea>
                <code class="text-danger small font-weight-bold float-right" id="address_error" style="display: none;"></code>
            </div>
        </div>
        <!-- supplier details content end -->

        <hr>

        <!-- ADD button - CENTERED -->
        <div class="button-wrapper">
            <button class="btn btn-primary-custom" onclick="addSupplier();">
                <i class="fas fa-save"></i> ADD SUPPLIER
            </button>
        </div>
        
        <!-- result message -->
        <div id="supplier_acknowledgement" class="col-md-12 text-center mt-3" style="font-family: sans-serif;"></div>
        
    </div>
</div>

<!-- Font Awesome icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
